config-version = 2

after-startup-command = ['exec-and-forget brew services restart sketchybar']
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
automatically-unhide-macos-hidden-apps = true

exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

[key-mapping]
preset = 'qwerty'

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'secondary'
5 = 'secondary'

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.right = 12
outer.bottom = 12
outer.top = [{ monitor."main" = 54 }, 54]

[mode.main.binding]
alt-h = 'move left'
alt-j = 'move down'
alt-k = 'move up'
alt-l = 'move right'

alt-shift-h = 'exec-and-forget ~/.config/aerospace/scripts/focus.sh left'
alt-shift-j = 'exec-and-forget ~/.config/aerospace/scripts/focus.sh down'
alt-shift-k = 'exec-and-forget ~/.config/aerospace/scripts/focus.sh up'
alt-shift-l = 'exec-and-forget ~/.config/aerospace/scripts/focus.sh right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-tab = 'workspace-back-and-forth'

alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

alt-shift-r = ['mode resize', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=resize']
alt-shift-semicolon = ['mode service', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=service']

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
b = 'balance-sizes'
enter = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=main']
esc = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=main']

[mode.service.binding]
h = 'join-with left'
j = 'join-with down'
k = 'join-with up'
l = 'join-with right'
t = 'layout tiles horizontal vertical'
a = 'layout accordion horizontal vertical'
s = 'layout floating tiling'
f = 'fullscreen'
b = 'balance-sizes'
r = 'flatten-workspace-tree'
c = 'reload-config'
enter = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=main']
esc = ['mode main', 'exec-and-forget sketchybar --trigger aerospace_mode MODE=main']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'
